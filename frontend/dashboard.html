<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Copilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] } } }
    };
  </script>
  <style>
    .chat-messages { scrollbar-width: thin; }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    @keyframes pulse-dot { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    .typing-dot { animation: pulse-dot 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .tool-step { opacity: 0; transform: translateY(8px); transition: opacity 0.3s ease, transform 0.3s ease; }
    .tool-step.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-gray-900">Financial Copilot</h1>
        <p id="header-greeting" class="text-sm text-gray-500"></p>
      </div>
      <button onclick="logout()"
        class="border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition">
        Sign Out
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex flex-col gap-6" style="height: calc(100vh - 88px);">

    <!-- Transaction History -->
    <section class="bg-white rounded-xl border border-gray-200 p-6 flex flex-col min-h-0" style="flex: 2;">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <p class="text-sm font-medium text-gray-500">Transaction History</p>
          <span id="txn-balance"
            class="text-xs font-semibold bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full hidden">
          </span>
        </div>
        <button onclick="loadTransactions()"
          class="text-xs text-blue-600 hover:text-blue-800 font-medium transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Refresh
        </button>
      </div>
      <div id="txn-list" class="flex-1 overflow-y-auto space-y-1 min-h-0">
        <p class="text-sm text-gray-400 py-8 text-center">Loading transactions...</p>
      </div>
    </section>

    <!-- Chat + Tool Calls -->
    <section class="grid grid-cols-1 lg:grid-cols-5 gap-6 min-h-0" style="flex: 3;">

      <!-- Chat -->
      <div class="lg:col-span-2 bg-white rounded-xl border border-gray-200 p-6 flex flex-col min-h-0">
        <p class="text-sm font-medium text-gray-500 mb-4">Chat with your Financial Copilot</p>
        <div id="chat-messages" class="chat-messages space-y-3 flex-1 overflow-y-auto mb-4 p-2 min-h-0"></div>
        <form id="chat-form" class="flex gap-3 shrink-0">
          <input id="chat-input" type="text"
            placeholder='"Can I afford dinner?", "Show my transactions"'
            class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <button type="submit"
            class="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition whitespace-nowrap">
            Send
          </button>
        </form>
      </div>

      <!-- Tool Calls -->
      <div class="lg:col-span-3 bg-white rounded-xl border border-gray-200 p-6 flex flex-col min-h-0">
        <p class="text-sm font-medium text-gray-500 mb-4">Tool Calls</p>
        <div id="tool-calls-panel" class="space-y-3 flex-1 overflow-y-auto min-h-0">
          <p class="text-sm text-gray-400">Send a message to see which tools the copilot uses to answer your question.</p>
        </div>
      </div>

    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
