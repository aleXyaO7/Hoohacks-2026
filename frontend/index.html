<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetLess</title>
  <link rel="icon" href="assets/BudgetLess.webp" type="image/webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .tabs { display: flex; gap: 0; margin-bottom: 1.25rem; }
    .tab {
      flex: 1; padding: 0.6rem; text-align: center; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid #e4e4e7; color: #71717a;
      background: none; border-top: none; border-left: none; border-right: none;
      font-size: 1rem;
      font-family: Inter, system-ui, sans-serif;
    }
    .tab.active { color: #18181b; border-bottom-color: #18181b; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1 class="brand-heading">
        <img src="assets/BudgetLess.webp" alt="BudgetLess" width="320" height="80" class="brand-logo" />
      </h1>
      <p class="subtitle">Sign in or create a new account to get started.</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('signin')">Sign In</button>
        <button class="tab" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- Sign In -->
      <div id="tab-signin" class="tab-content active">
        <form id="signin-form" class="form">
          <label for="signinFirst">First Name</label>
          <input id="signinFirst" type="text" required />

          <label for="signinLast">Last Name</label>
          <input id="signinLast" type="text" required />

          <button type="submit">Sign In</button>
        </form>
        <p id="signin-message" class="message" aria-live="polite"></p>
      </div>

      <!-- Create Account -->
      <div id="tab-signup" class="tab-content">
        <form id="account-form" class="form">
          <label for="firstName">First Name</label>
          <input id="firstName" name="firstName" type="text" required />

          <label for="lastName">Last Name</label>
          <input id="lastName" name="lastName" type="text" required />

          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" inputmode="tel" required placeholder="e.g. 5551234567" />

          <button type="submit">Create Account</button>
        </form>
        <p id="account-message" class="message" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      if (tab === 'signin') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('tab-signin').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('tab-signup').classList.add('active');
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
