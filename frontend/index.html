<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Create Your Account</h1>
      <p class="subtitle">Enter your basic info to get started.</p>

      <form id="account-form" class="form">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />

        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />

        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" inputmode="tel" required placeholder="e.g. 5551234567" />

        <button type="submit">Continue</button>
      </form>

      <p id="account-message" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
